<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Monitoring Integrasi RTRW-MTPP</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Leaflet -->
    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Chart.js (untuk grafik nanti) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <h1>Dashboard Monitoring Integrasi RTRW-MTPP</h1>

    <!-- KPI -->
    <div id="summary">

        <div class="card">
            <h2 id="terintegrasi">0</h2>
            <p>Terintegrasi</p>
        </div>

        <div class="card">
            <h2 id="proses">0</h2>
            <p>Proses Integrasi</p>
        </div>

        <div class="card">
            <h2 id="mtpp">0</h2>
            <p>Penyusunan MTPP</p>
        </div>

        <div class="card">
            <h2 id="nonlaut">0</h2>
            <p>Tidak Memiliki Wilayah Laut</p>
        </div>

    </div>

    <!-- Peta -->
    <div id="map"></div>

    <!-- Javascript -->
    <script src="js/map.js"></script>
    <script src="js/dashboard.js"></script>

</body>

</html>
