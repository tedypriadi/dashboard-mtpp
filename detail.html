<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Detail Provinsi</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial,sans-serif;
margin:20px;
background:#1f2128;
color:white;
}

.card{
background:#2b2d35;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

#map{
height:700px;
border-radius:10px;
border:1px solid #3a3f4b;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.top-container{
    display:flex;
    gap:30px;
    align-items:flex-start;
}

.map-panel{
    width:50%;
}

.profile-panel{
    width:50%;
}

#map{
    height:700px;
    border-radius:10px;
}

#judul{
    font-size:56px;
font-weight:700;
    margin-bottom:20px;
}

.profile-panel table{
    width:100%;
    border-collapse:collapse;
    font-size:22px;
}

.profile-panel td{
    padding:6px;
}

.profile-title{
    font-size:34px;
    margin-bottom:20px;
}

.profile-description{
    margin-top:40px;
    line-height:1.8;
    font-size:22px;
    text-align:justify;
}

.section-title{
    margin-top:40px;
    margin-bottom:20px;
    font-size:32px;
}

.spatial-container{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.spatial-table-card{
    width:65%;
    background:#2b2d35;
    padding:20px;
    border-radius:10px;
}

.spatial-chart-card{
    width:35%;
    background:#2b2d35;
    padding:20px;
    border-radius:10px;
}

.spatial-table-wrapper{
    display:flex;
    gap:20px;
}

.spatial-column{
    width:50%;
}

.spatial-column table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

.spatial-column th{
    text-align:left;
    border-bottom:1px solid #444;
    padding:6px;
}

.spatial-column td{
    padding:4px 6px;
}

.spatial-column tr:hover{
    background:#363944;
}

#barChart{
    height:650px !important;
}
    
</style>

</head>

<body>

<h1 id="judul"></h1>

<div class="top-container">

    <div class="map-panel">
        <div id="map"></div>
    </div>

    <div class="profile-panel">
        <div id="profil"></div>
    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/detail.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>

</html>
