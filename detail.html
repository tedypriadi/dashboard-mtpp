<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Detail Provinsi</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#1f2128;
    color:white;
}

#judul{
    font-size:56px;
    font-weight:700;
    margin-bottom:20px;
}

.card{
    background:#2b2d35;
    padding:20px;
    border-radius:10px;
}

.top-container{
    display:flex;
    gap:30px;
    align-items:flex-start;
    margin-bottom:40px;
}

.map-panel{
    width:50%;
}

.profile-panel{
    width:50%;
}

#map{
    height:700px;
    border-radius:10px;
    border:1px solid #3a3f4b;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.profile-panel table{
    width:100%;
    border-collapse:collapse;
    font-size:22px;
}

.profile-panel td{
    padding:8px 0;
    vertical-align:top;
}

.profile-title{
    font-size:34px;
    margin-bottom:20px;
    font-weight:bold;
}

.profile-description{
    margin-top:30px;
    line-height:1.8;
    font-size:22px;
    text-align:justify;
}

.section-title{
    font-size:32px;
    margin-bottom:20px;
}

.spatial-table-card{
    width:100%;
    background:#2b2d35;
    padding:20px;
    border-radius:10px;
    margin-bottom:25px;
}

.spatial-chart-card{
    width:100%;
    background:#2b2d35;
    padding:20px;
    border-radius:10px;
}

.spatial-table-card h3,
.spatial-chart-card h3{
    margin-top:0;
    margin-bottom:20px;
    font-size:24px;
}

.spatial-table-wrapper{
    display:flex;
    gap:30px;
}

.spatial-column{
    width:50%;
}

.spatial-column table{
    width:100%;
    border-collapse:collapse;
    font-size:15px;
}

.spatial-column th{
    text-align:left;
    padding:10px;
    border-bottom:2px solid #444;
}

.spatial-column td{
    padding:8px 10px;
    border-bottom:1px solid #333;
}

.spatial-column tr:hover{
    background:#363944;
}

#barChart{
    height:500px !important;
}

@media (max-width:1200px){

    .top-container{
        flex-direction:column;
    }

    .map-panel,
    .profile-panel{
        width:100%;
    }

}

@media (max-width:900px){

    .spatial-table-wrapper{
        flex-direction:column;
    }

    .spatial-column{
        width:100%;
    }

}

</style>

</head>

<body>

<h1 id="judul"></h1>

<!-- PETA + PROFIL -->

<div class="top-container">

    <div class="map-panel">
        <div id="map"></div>
    </div>

    <div class="profile-panel">
        <div id="profil"></div>
    </div>

</div>

<!-- STATISTIK POLA RUANG -->

<div class="section-title">
    Statistik Pola Ruang
</div>

<div class="spatial-table-card">

    <h3>
        Detail Luas Pola Ruang Laut
    </h3>

    <div id="spatialTable"></div>

</div>

<div class="spatial-chart-card">

    <h3>
        10 Pola Ruang Terluas
    </h3>

    <canvas id="barChart"></canvas>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/detail.js"></script>

</body>

</html>
